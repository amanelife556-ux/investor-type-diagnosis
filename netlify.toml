[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-image-v2.png"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=3600"
